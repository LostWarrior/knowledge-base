name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build Release Tarball
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}
      tarball: ${{ steps.tarball.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          script_version="$(sed -n 's/^KB_VERSION="\([^"]*\)"$/\1/p' bin/kb)"
          if [[ "${version}" != "${script_version}" ]]; then
            echo "Tag ${version} does not match bin/kb version ${script_version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build tarball
        id: tarball
        run: |
          tarball_path="$(./scripts/build-release-tarball.sh dist)"
          echo "name=$(basename "${tarball_path}")" >> "${GITHUB_OUTPUT}"

      - name: Generate checksums
        id: sha
        run: |
          cd dist
          sha256sum "kb-${{ steps.version.outputs.version }}.tar.gz" | tee SHA256SUMS.txt
          echo "sha256=$(cut -d' ' -f1 SHA256SUMS.txt)" >> "${GITHUB_OUTPUT}"

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: |
            dist/${{ steps.tarball.outputs.name }}
            dist/SHA256SUMS.txt

  notarize:
    needs: package
    uses: ./.github/workflows/notarize-macos.yml
    with:
      version: ${{ needs.package.outputs.version }}
    secrets:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
      APPLE_DEVELOPER_ID_INSTALLER_P12: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_P12 }}
      APPLE_DEVELOPER_ID_INSTALLER_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_P12_PASSWORD }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package
      - notarize
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: notarized-pkg
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ needs.package.outputs.tarball }}
            dist/SHA256SUMS.txt
            dist/kb-${{ needs.package.outputs.version }}.pkg

  update-homebrew-formula:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs:
      - package
      - release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update formula for released version
        run: ./scripts/update-homebrew-formula.sh "${{ needs.package.outputs.version }}" "${{ needs.package.outputs.sha256 }}"

      - name: Commit formula update
        run: |
          if git diff --quiet -- Formula/kb.rb; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/kb.rb
          git commit -m "chore: update Homebrew formula for v${{ needs.package.outputs.version }}"
          git push
